version: "3.9"

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: greenmark_rms
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:changeme@db:5432/greenmark_rms?schema=public
      JWT_SECRET: ${JWT_SECRET:-greenmark-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: 15m
      PORT: 3000
      CORS_ORIGIN: http://localhost,http://localhost:80
      CHAPA_SECRET_KEY: ${CHAPA_SECRET_KEY:-}
      CHAPA_WEBHOOK_URL: ${CHAPA_WEBHOOK_URL:-}
      CHAPA_RETURN_URL: ${CHAPA_RETURN_URL:-}
    ports:
      - "3000:3000"

  # ── React Frontend (nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
